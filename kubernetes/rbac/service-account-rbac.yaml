# =============================================================================
# service-account-rbac.yaml
# Purpose : Kubernetes ServiceAccounts and RBAC bindings for all Apigee
#           Hybrid components. Each component gets its own ServiceAccount
#           with the minimum required permissions (least-privilege).
#
# Apply   : kubectl apply -f kubernetes/rbac/service-account-rbac.yaml -n apigee
# =============================================================================

# ── Synchronizer ServiceAccount ───────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apigee-synchronizer
  namespace: apigee
  labels:
    app: apigee-synchronizer
    managed-by: platform-team
  annotations:
    # Workload Identity binding — links K8s SA to GCP SA
    iam.gke.io/gcp-service-account: "apigee-sync-sa@PROJECT_ID.iam.gserviceaccount.com"

---
# ── UDCA ServiceAccount ───────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apigee-udca
  namespace: apigee
  labels:
    app: apigee-udca
    managed-by: platform-team
  annotations:
    iam.gke.io/gcp-service-account: "apigee-udca-sa@PROJECT_ID.iam.gserviceaccount.com"

---
# ── Metrics ServiceAccount ────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apigee-metrics
  namespace: apigee
  labels:
    app: apigee-metrics
    managed-by: platform-team
  annotations:
    iam.gke.io/gcp-service-account: "apigee-metrics-sa@PROJECT_ID.iam.gserviceaccount.com"

---
# ── Cassandra ServiceAccount ──────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apigee-cassandra
  namespace: apigee
  labels:
    app: apigee-cassandra
    managed-by: platform-team
  annotations:
    iam.gke.io/gcp-service-account: "apigee-cassandra-sa@PROJECT_ID.iam.gserviceaccount.com"

---
# ── Role: Apigee Runtime Components ──────────────────────────────────────────
# Minimum permissions needed by Synchronizer and UDCA to function.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: apigee-runtime-role
  namespace: apigee
  labels:
    managed-by: platform-team
rules:
  # Read own configuration secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
    resourceNames:
      - "apigee-synchronizer-svc-account"
      - "apigee-udca-svc-account"
      - "apigee-cassandra-auth"
      - "apigee-cassandra-tls"
      - "apigee-ingress-tls"

  # Read ConfigMaps for component configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

  # Allow components to emit events (for troubleshooting)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # Read own pod information
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
# ── RoleBinding: Synchronizer ─────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: apigee-synchronizer-binding
  namespace: apigee
  labels:
    managed-by: platform-team
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: apigee-runtime-role
subjects:
  - kind: ServiceAccount
    name: apigee-synchronizer
    namespace: apigee

---
# ── RoleBinding: UDCA ─────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: apigee-udca-binding
  namespace: apigee
  labels:
    managed-by: platform-team
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: apigee-runtime-role
subjects:
  - kind: ServiceAccount
    name: apigee-udca
    namespace: apigee

---
# ── ClusterRole: Apigee Metrics ───────────────────────────────────────────────
# Metrics component needs cluster-level read access to scrape pod/node metrics.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: apigee-metrics-cluster-role
  labels:
    managed-by: platform-team
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]

---
# ── ClusterRoleBinding: Apigee Metrics ───────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: apigee-metrics-cluster-binding
  labels:
    managed-by: platform-team
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: apigee-metrics-cluster-role
subjects:
  - kind: ServiceAccount
    name: apigee-metrics
    namespace: apigee
