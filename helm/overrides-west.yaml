# =============================================================================
# overrides-west.yaml — West US Region Helm Overrides
# Apigee Hybrid on AKS — Multi-Region Platform
# =============================================================================

gcp:
  region: "us-west1"

apigee:
  environment: "prod-west"
  axRegion: "us-west1"

ingressGateway:
  replicaCount: 3
  nodeSelector:
    agentpool: "apigee-ingress-west"
  tolerations:
    - key: "apigee-component"
      operator: "Equal"
      value: "ingress"
      effect: "NoSchedule"
  resources:
    requests:
      cpu: "2"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "4Gi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

messageProcessor:
  replicaCount: 3
  nodeSelector:
    agentpool: "apigee-runtime-west"
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilizationPercentage: 65

synchronizer:
  replicaCount: 2
  nodeSelector:
    agentpool: "apigee-runtime-west"
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

udca:
  replicaCount: 2
  nodeSelector:
    agentpool: "apigee-runtime-west"

redis:
  replicaCount: 3
  nodeSelector:
    agentpool: "apigee-runtime-west"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"

cassandra:
  replicaCount: 3
  nodeSelector:
    agentpool: "apigee-cassandra-west"
  resources:
    requests:
      cpu: "2"
      memory: "8Gi"
    limits:
      cpu: "4"
      memory: "16Gi"
  multiRegionSeedHost: "10.0.0.10"            # East Cassandra seed IP
  datacenter: "dc-west"
  rack: "rack-west-1"
